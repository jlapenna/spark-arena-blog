<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#5a8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#76b900" stroke-width="8"/>
  <!-- Lightning bolt / spark -->
  <path d="M310 80 L180 260 L250 260 L200 432 L340 240 L270 240 Z" 
        fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Small spark particles -->
  <circle cx="160" cy="180" r="6" fill="#76b900" opacity="0.7"/>
  <circle cx="370" cy="320" r="5" fill="#76b900" opacity="0.6"/>
  <circle cx="140" cy="340" r="4" fill="#76b900" opacity="0.5"/>
  <circle cx="380" cy="170" r="5" fill="#76b900" opacity="0.5"/>
</svg>
